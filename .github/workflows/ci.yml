name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  fedora-44-x86_64:
    runs-on: ubuntu-latest
    container:
      image: fedora:44
      options: --privileged
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Install native toolchain
        run: >-
          dnf5 install -y cargo clang clippy gcc libmodulemd-devel libsolv-devel
          nettle-devel pkgconf-pkg-config rpm-devel rust rustfmt util-linux zstd
      - name: Prepare a trusted workspace
        run: |
          ci_workspace=/opt/dnfast-ci
          install -d -m 0755 -o root -g root "$ci_workspace"
          cp -a "$GITHUB_WORKSPACE/." "$ci_workspace/"
          chown -R root:root "$ci_workspace"
          chmod -R go-w "$ci_workspace"
          printf 'CI_WORKSPACE=%s\n' "$ci_workspace" >> "$GITHUB_ENV"
      - name: Format
        run: >-
          cargo fmt --manifest-path "$CI_WORKSPACE/Cargo.toml"
          --all -- --check
      - name: Check
        env:
          DNFAST_NATIVE_REAL: "1"
        run: >-
          cargo check --manifest-path "$CI_WORKSPACE/Cargo.toml"
          --locked --workspace --all-targets
      - name: Clippy
        env:
          DNFAST_NATIVE_REAL: "1"
        run: >-
          cargo clippy --manifest-path "$CI_WORKSPACE/Cargo.toml"
          --locked --workspace --all-targets -- -D warnings
      - name: Test
        env:
          DNFAST_NATIVE_REAL: "1"
        run: >-
          cargo test --manifest-path "$CI_WORKSPACE/Cargo.toml"
          --locked --workspace --all-targets -- --test-threads=1
