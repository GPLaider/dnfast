name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  fedora-44-x86_64:
    runs-on: ubuntu-latest
    container:
      image: fedora:44
      options: --privileged
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Install native toolchain
        run: >-
          dnf5 install -y cargo clang clippy gcc libmodulemd-devel libsolv-devel
          nettle-devel pkgconf-pkg-config rpm-devel rust rustfmt util-linux zstd
      - name: Prepare a trusted workspace
        run: |
          workspace_uid=$(stat -c '%u' "$GITHUB_WORKSPACE")
          workspace_gid=$(stat -c '%g' "$GITHUB_WORKSPACE")
          ci_home="$RUNNER_TEMP/dnfast-home"
          ci_workspace=/opt/dnfast-ci
          install -d -o "$workspace_uid" -g "$workspace_gid" "$ci_home"
          install -d -m 0755 -o "$workspace_uid" -g "$workspace_gid" "$ci_workspace"
          cp -a "$GITHUB_WORKSPACE/." "$ci_workspace/"
          chown -R "$workspace_uid:$workspace_gid" "$ci_workspace"
          chmod -R go-w "$ci_workspace"
          printf 'CI_UID=%s\nCI_GID=%s\nCI_HOME=%s\nCI_WORKSPACE=%s\n' \
            "$workspace_uid" "$workspace_gid" "$ci_home" "$ci_workspace" >> "$GITHUB_ENV"
      - name: Format
        run: >-
          setpriv --reuid="$CI_UID" --regid="$CI_GID" --clear-groups
          env HOME="$CI_HOME" cargo fmt --manifest-path "$CI_WORKSPACE/Cargo.toml"
          --all -- --check
      - name: Check
        env:
          DNFAST_NATIVE_REAL: "1"
        run: >-
          setpriv --reuid="$CI_UID" --regid="$CI_GID" --clear-groups
          env HOME="$CI_HOME" cargo check --manifest-path "$CI_WORKSPACE/Cargo.toml"
          --locked --workspace --all-targets
      - name: Clippy
        env:
          DNFAST_NATIVE_REAL: "1"
        run: >-
          setpriv --reuid="$CI_UID" --regid="$CI_GID" --clear-groups
          env HOME="$CI_HOME" cargo clippy --manifest-path "$CI_WORKSPACE/Cargo.toml"
          --locked --workspace --all-targets -- -D warnings
      - name: Test without the privileged mount-namespace case
        env:
          DNFAST_NATIVE_REAL: "1"
        run: >-
          setpriv --reuid="$CI_UID" --regid="$CI_GID" --clear-groups
          env HOME="$CI_HOME" cargo test --manifest-path "$CI_WORKSPACE/Cargo.toml"
          --locked --workspace --all-targets -- --test-threads=1
          --skip bounded_journal_filesystem_enospc_keeps_prepared_authoritative
      - name: Test privileged mount-namespace ENOSPC recovery
        env:
          DNFAST_NATIVE_REAL: "1"
        run: >-
          cargo test --manifest-path "$CI_WORKSPACE/Cargo.toml"
          --locked -p dnfast-state --test fault_recovery
          bounded_journal_filesystem_enospc_keeps_prepared_authoritative
          -- --exact --test-threads=1
